<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="stylesheet" href="dashboard.css">
    
    <link rel="stylesheet" href="tarefas.css">
</head>
<body>

    <div class="app-screen">
        <div class="sphere sphere-4"></div>
        
        <div class="dashboard-content">
            <header class="dashboard-header">
                <div class="header-top-row">
                    <h1 style="color: white; font-size: 30px; font-weight: 700;">Minhas Tarefas</h1>
                    <button id="page-add-task-btn" style="background:none; border:none; color:#7c3aed; cursor:pointer;">
                        <i class="material-icons" style="font-size: 32px;">add_circle</i>
                    </button>
                </div>
            </header>

            <main class="main-stats" style="margin-top: 15px;">
                <div class="kanban-container">
                    
                    <div class="kanban-column">
                        <div class="column-title"><span class="dot todo"></span> Aguardando</div>
                        <div class="kanban-list" id="list-todo"></div>
                    </div>

                    <div class="kanban-column">
                        <div class="column-title"><span class="dot doing"></span> Em Preparo</div>
                        <div class="kanban-list" id="list-doing"></div>
                    </div>

                    <div class="kanban-column">
                        <div class="column-title"><span class="dot done"></span> Concluído</div>
                        <div class="kanban-list" id="list-done"></div>
                    </div>

                </div>
            </main>

            <nav class="bottom-nav">
                <i class="material-icons" id="nav-home">home</i>
                <i class="material-icons active" id="nav-tasks">assignment</i>
                <i class="material-icons">settings</i>
            </nav>
        </div>

        <div class="task-modal" id="task-modal">
        <div class="task-modal-content">
            <h3>Nova Tarefa</h3>
            
            <div class="form-group">
                <label>Nome da Tarefa</label>
                <input type="text" id="modal-task-name" placeholder="Ex: Fazer resumo, assistir aula...">
            </div>

            <div class="form-group">
                <label>Dia da Semana</label>
                <div class="custom-select-wrapper">
                    <button type="button" class="custom-select-trigger" id="day-trigger" data-value="1">Segunda-feira</button>
                    <div class="custom-options" id="day-options">
                <div class="custom-option selected" data-value="1">Segunda-feira</div>
                        <div class="custom-option" data-value="2">Terça-feira</div>
                        <div class="custom-option" data-value="3">Quarta-feira</div>
                        <div class="custom-option" data-value="4">Quinta-feira</div>
                        <div class="custom-option" data-value="5">Sexta-feira</div>
                        <div class="custom-option" data-value="6">Sábado</div>
                        <div class="custom-option" data-value="0">Domingo</div>
                    </div>
                </select>
            </div>

            <div class="form-group">
                <label>Disciplina</label>
                <div class="custom-select-wrapper">
                    <button type="button" class="custom-select-trigger" id="subject-trigger" data-value="Arquitetura de Computadores">Arquitetura de Computadores</button>
                    <div class="custom-options" id="subject-options">
                        <div class="custom-option selected" data-value="Arquitetura de Computadores">Arquitetura de Computadores</div>
                        <div class="custom-option" data-value="Engenharia de Software">Engenharia de Software</div>
                        <div class="custom-option" data-value="Práticas de Programação">Práticas de Programação</div>
                        <div class="custom-option" data-value="Carreira e Futuro">Carreira e Futuro</div>
                        <div class="custom-option" data-value="Cultura">Cultura</div>
                        <div class="custom-option" data-value="Outros">Outros / Atividades</div>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="btn-close-modal">Cancelar</button>
                <button class="btn-save" id="btn-save-task">Adicionar</button>
            </div>
        </div>

        
    </div>
    

    

    <script src="script.js"></script>
</body>
</html>

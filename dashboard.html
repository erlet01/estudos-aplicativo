<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFocus - Painel</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="app-screen dashboard">
        <div class="sphere sphere-4"></div>
        
        <div class="dashboard-content">
                <div class="dashboard-header">
    <div class="header-top-row">
        <h1 id="current-day-name"></h1>
        <div class="month-selector" id="open-full-calendar">
            <span id="current-month-year">JUL 2026</span>
            <i class="material-icons">expand_more</i>
        </div>
    </div>

    <div class="calendar-strip">
        <div class="day" data-day="1"><small>S</small><strong class="num">-</strong></div>
        <div class="day" data-day="2"><small>T</small><strong class="num">-</strong></div>
        <div class="day" data-day="3"><small>Q</small><strong class="num">-</strong></div>
        <div class="day" data-day="4"><small>Q</small><strong class="num">-</strong></div>
        <div class="day" data-day="5"><small>S</small><strong class="num">-</strong></div>
        <div class="day" data-day="6"><small>S</small><strong class="num">-</strong></div>
        <div class="day" data-day="0"><small>D</small><strong class="num">-</strong></div>
    </div>
</div>

<div class="calendar-modal" id="calendar-modal">
    <div class="modal-content">
        <div class="modal-header">
            <button id="prev-month"><i class="material-icons">chevron_left</i></button>
            <h3 id="modal-month-title">Julho 2026</h3>
            <button id="next-month"><i class="material-icons">chevron_right</i></button>
        </div>
        <div class="modal-weekdays">
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>
        <div class="modal-days-grid" id="modal-days-grid">
            </div>
        <button class="close-modal-btn" id="close-calendar">Fechar</button>
    </div>
</div>
            </header>

            <main class="main-stats">
                <div class="welcome-msg">
                    <h2>Olá, Letícia!</h2>
                    <span>Hoje é dia de focar em</span>
                </div>
                <div class="schedule-card">
        <div class="schedule-icon">
            <i class="material-icons" id="schedule-icon-day">auto_stories</i>
        </div>
        <div class="schedule-info">
            <h3 id="schedule-subject">Carregando cronograma...</h3>
            <p>Matéria do dia</p>
        </div>
            </main>

            <nav class="bottom-nav">
                <span class="material-icons active">home</span>
                <span class="material-icons">leaderboard</span>
                <span class="material-icons">settings</span>
            </nav>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

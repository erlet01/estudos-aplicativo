<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFocus - Painel</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="app-screen dashboard">
        <div class="sphere sphere-4"></div>
        
        <div class="dashboard-content">
            <header class="dashboard-header">
                <p id="current-day-name">Segunda-feira</p>
                <div class="calendar-strip">
    <div class="day" data-day="1"><small>S</small><strong class="num">-</strong></div>
    <div class="day" data-day="2"><small>T</small><strong class="num">-</strong></div>
    <div class="day" data-day="3"><small>Q</small><strong class="num">-</strong></div>
    <div class="day" data-day="4"><small>Q</small><strong class="num">-</strong></div>
    <div class="day" data-day="5"><small>S</small><strong class="num">-</strong></div>
    <div class="day" data-day="6"><small>S</small><strong class="num">-</strong></div>
    <div class="day" data-day="0"><small>D</small><strong class="num">-</strong></div>
</div>
            </header>

            <main class="main-stats">
                <div class="welcome-msg">
                    <h2>Olá, Letícia!</h2>
                    <span>O que vamos aprender hoje?</span>
                </div>

                <div class="task-card">
                    <span class="material-icons">auto_stories</span>
                    <div class="task-info">
                        <strong>Revisão de Biologia</strong>
                        <p>14:00 - 15:30</p>
                    </div>
                    <div class="status-dot"></div>
                </div>
            </main>

            <nav class="bottom-nav">
                <span class="material-icons active">home</span>
                <span class="material-icons">leaderboard</span>
                <span class="material-icons">settings</span>
            </nav>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

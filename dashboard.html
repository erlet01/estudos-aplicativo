<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFocus - Painel</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="tarefas.css">
</head>
<body>

    <div class="app-screen dashboard">
        <div class="sphere sphere-4"></div>
        
        <div class="dashboard-content">
                <div class="dashboard-header">
    <div class="header-top-row">
        <h1 id="current-day-name"></h1>
        <div class="month-selector" id="open-full-calendar">
            <span id="current-month-year">JUL 2026</span>
            <i class="material-icons">expand_more</i>
        </div>
    </div>

    <div class="calendar-strip">
        <div class="day" data-day="1"><small>S</small><strong class="num">-</strong></div>
        <div class="day" data-day="2"><small>T</small><strong class="num">-</strong></div>
        <div class="day" data-day="3"><small>Q</small><strong class="num">-</strong></div>
        <div class="day" data-day="4"><small>Q</small><strong class="num">-</strong></div>
        <div class="day" data-day="5"><small>S</small><strong class="num">-</strong></div>
        <div class="day" data-day="6"><small>S</small><strong class="num">-</strong></div>
        <div class="day" data-day="0"><small>D</small><strong class="num">-</strong></div>
    </div>
</div>

<div class="calendar-modal" id="calendar-modal">
    <div class="modal-content">
        <div class="modal-header">
            <button id="prev-month"><i class="material-icons">chevron_left</i></button>
            <h3 id="modal-month-title">Julho 2026</h3>
            <button id="next-month"><i class="material-icons">chevron_right</i></button>
        </div>
        <div class="modal-weekdays">
            <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
        </div>
        <div class="modal-days-grid" id="modal-days-grid">
            </div>
        <button class="close-modal-btn" id="close-calendar">Fechar</button>
    </div>
</div>
            </header>

            <main class="main-stats">
        <div class="welcome-msg">
            <h2>Olá, Letícia!</h2>
            <span>Hoje é dia de focar em</span>
        </div>

        <div class="schedule-card">
            <div class="schedule-icon">
                <i class="material-icons" id="schedule-icon-day">auto_stories</i>
            </div>
            <div class="schedule-info">
                <h3 id="schedule-subject">Carregando cronograma...</h3>
                <p>Matéria do dia</p>
            </div>
        </div>

        <div class="dashboard-stats-card">
    <div class="stats-header">
        <div class="stats-title">
            <i class="material-icons">timer</i>
            <span>Sessões de Foco</span>
        </div>
        <button class="btn-go-pomodoro" onclick="location.href='pomodoro.html'">
            Ir ao Pomodoro <i class="material-icons">chevron_right</i>
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-number" id="dash-stat-today">0</span>
            <span class="stat-text">Hoje</span>
        </div>
        <div class="stat-box">
            <span class="stat-number" id="dash-stat-week">0</span>
            <span class="stat-text">Semana</span>
        </div>
        <div class="stat-box">
            <span class="stat-number" id="dash-stat-month">0</span>
            <span class="stat-text">Mês</span>
        </div>
    </div>
</div>

        <div class="tasks-section">
            <div class="tasks-header">
                <h4>Tarefas de Hoje</h4>
                <button id="add-task-btn"><i class="material-icons">add_circle</i></button>
            </div>
            
            <div class="tasks-list" id="tasks-list">
                </div>
        </div>
        </main>

        <nav class="bottom-nav">
    <button class="nav-item active" id="nav-home">
        <i class="material-icons">home</i>
        <span>Início</span>
    </button>
    <button class="nav-item" id="nav-studies">
        <i class="material-icons">school</i>
        <span>Estudos</span>
    </button>
    <button class="nav-item" id="nav-pomodoro">
        <i class="material-icons">timer</i>
        <span>Foco</span>
    </button>
</nav>

    </div>

    <script src="script.js"></script>
</body>
</html>

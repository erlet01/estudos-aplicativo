<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="gran.css">
    <link rel="stylesheet" href="pomodoro.css">
</head>
<body>
    <div class="app-screen">
        <header class="app-header">
            <div style="width: 40px;"></div>
            <h2>Foco Pomodoro</h2>
            <div style="width: 40px;"></div>
        </header>
<main class="dashboard-content">
            <div class="session-setup-card">
                <div class="setup-header">
                    <i class="material-icons">tune</i>
                    <span>Configurar Sessão</span>
                </div>
                
                <div class="setup-inputs">
                    <div class="input-group">
                        <label for="focus-min">Foco (min)</label>
                        <input type="number" id="focus-min" value="25" min="1" max="180">
                    </div>
                    <div class="input-group">
                        <label for="break-min">Pausa (min)</label>
                        <input type="number" id="break-min" value="5" min="1" max="60">
                    </div>
                </div>

                <div class="preset-chips">
                    <button class="chip-btn active" data-focus="25" data-break="5">25/5</button>
                    <button class="chip-btn" data-focus="45" data-break="10">45/10</button>
                    <button class="chip-btn" data-focus="50" data-break="10">50/10</button>
                    <button class="chip-btn" data-focus="60" data-break="15">60/15</button>
                </div>
            </div>
        <main class="dashboard-content">
            

            <div class="timer-display">
                <div class="circle-container">
                    <div class="timer-value" id="timer">25:00</div>
                </div>
                <div class="timer-label" id="status-label">Hora de focar</div>
            </div>

            <div class="timer-controls">
                <button class="btn-timer btn-reset" id="reset"><i class="material-icons">refresh</i></button>
                <button class="btn-timer btn-play" id="start-pause"><i class="material-icons">play_arrow</i></button>
            </div>
        </main>
<div class="modal-overlay" id="custom-modal">
    <div class="modal-card">
        <div class="modal-icon" id="modal-icon">
            <i class="material-icons">notifications_active</i>
        </div>
        <h3 id="modal-title">Tempo Finalizado!</h3>
        <p id="modal-message">Sua sessão de estudo terminou. Hora de descansar um pouco!</p>
        <button id="btn-modal-close">Entendido</button>
    </div>
</div>
        <nav class="bottom-nav">
            <button class="nav-item" onclick="location.href='dashboard.html'"><i class="material-icons">home</i><span>Início</span></button>
            <button class="nav-item" onclick="location.href='estudos.html'"><i class="material-icons">school</i><span>Estudos</span></button>
            <button class="nav-item active" onclick="location.href='pomodoro.html'"><i class="material-icons">timer</i><span>Foco</span></button>
        </nav>
    </div>

    <script src="pomodoro.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFocus Login</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-screen">
        <div class="bg-wave"></div>
        <div class="sphere sphere-1"></div>
        <div class="sphere sphere-2"></div>
        <div class="sphere sphere-3"></div>

        <div class="content-container">
            
            <div class="app-header">
                <span class="material-icons study-icon">menu_book</span>
                <h1>EduFocus</h1>
                <p>Bem-vinda de volta!</p>
            </div>

            <div class="login-card">
                <h2>Entrar</h2>
                
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="leticia@exemplo.com">
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="••••••••">
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembrar de mim</label>
                </div>
            </div>

            <div class="user-action-area">
                <button id="leticia-btn" class="leticia-profile-btn">
                    <div class="avatar">
                        <span class="material-icons">person</span>
                    </div>
                    <span>Estudar como Letícia</span>
                </button>
            </div>

        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFocus Login</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-screen">
        <div class="bg-wave"></div>
        <div class="sphere sphere-1"></div>
        <div class="sphere sphere-2"></div>
        <div class="sphere sphere-3"></div>

        <div class="content-container">
            
            <div class="app-header">
                <span class="material-icons study-icon">menu_book</span>
                <h1>EduFocus</h1>
                <p>Que bom ver você de volta!</p>
            </div>

            <div class="login-card">
                <h2>Selecionar Perfil</h2>
                
                <button id="leticia-btn" class="leticia-profile-btn">
                    <div class="avatar">
                        <span class="material-icons">person</span>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Letícia</span>
                        <span class="user-status">Toque para entrar</span>
                    </div>
                    <span class="material-icons arrow-icon">arrow_forward_ios</span>
                </button>
            </div>

            <div class="footer-space"></div>

        </div>
    </div>
<script src="script.js"></script>
</body>
</html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Faculdade</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="estudos.css">
    <link rel="stylesheet" href="gran.css"> </head>
<body>
    <div class="app-screen">
        <header class="app-header">
            <button id="btn-back" class="icon-btn"><i class="material-icons">arrow_back</i></button>
            <h2></h2>
            <div style="width: 24px;"></div>
        </header>

        <main class="dashboard-content">
            <div class="faculty-card">
    <h1 class="faculty-name">Gran Faculdade</h1>
    <p class="faculty-course">Análise e Desenvolvimento de Sistemas</p>
</div>

            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month"> &lt; </button>
                    <h3 id="calendar-month-year">Julho 2026</h3>
                    <button id="next-month"> &gt; </button>
                </div>
                <div class="calendar-weekdays">
                    <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
                </div>
                <div class="calendar-days" id="calendar-days"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item" id="nav-home"><i class="material-icons">home</i><span>Início</span></button>
            <button class="nav-item active" id="nav-studies"><i class="material-icons">school</i><span>Estudos</span></button>
        </nav>
    </div>

    <div id="modal-event" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3>Novo Evento</h3>
            <p id="selected-date-text" style="color: #a78bfa; font-size: 12px;"></p>
            
            <input type="text" id="event-title-input" placeholder="O que tem para hoje?">
            
            <div class="modal-buttons">
                <button id="btn-cancel-event" class="btn-cancel">Voltar</button>
                <button id="btn-save-event" class="btn-save">Agendar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
